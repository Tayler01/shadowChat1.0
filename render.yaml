services:
  - type: worker
    name: shado-news-scraper
    runtime: docker
    plan: starter
    dockerfilePath: ./services/news-scraper/Dockerfile
    dockerContext: .
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEWS_SCRAPE_INTERVAL_MS
        value: "90000"
      - key: NEWS_SCRAPE_HEADLESS
        value: "true"
      - key: PINCHTAB_CDP_URL
        sync: false
      - key: PINCHTAB_WS_ENDPOINT
        sync: false
      - key: X_USERNAME
        sync: false
      - key: X_EMAIL
        sync: false
      - key: X_SECONDARY_IDENTIFIER
        sync: false
      - key: X_PASSWORD
        sync: false
      - key: X_AUTH_TOKEN
        sync: false
      - key: X_CT0
        sync: false
      - key: NEWS_X_COOKIE_HEADER
        sync: false
      - key: NEWS_X_AUTH_STATE_PATH
        value: "/opt/render/project/src/.news-scraper/x-auth-state.json"
      - key: NEWS_X_SCROLL_STEPS
        value: "2"
      - key: NEWS_X_MAX_CANDIDATES
        value: "20"
      - key: TRUTH_USERNAME
        sync: false
      - key: TRUTH_EMAIL
        sync: false
      - key: TRUTH_PASSWORD
        sync: false
