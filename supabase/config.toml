project_id = "chat2-0"

# Bridge functions perform their own endpoint-level authentication:
# - device bootstrap endpoints use device id, pairing code, and bridge token checks
# - user approval/revoke endpoints validate the caller's Supabase user token in code
# This keeps ESP firmware calls compatible with the serial-first Phase 0 contract.
[functions.bridge-register]
verify_jwt = false

[functions.bridge-pairing-begin]
verify_jwt = false

[functions.bridge-pairing-status]
verify_jwt = false

[functions.bridge-session-exchange]
verify_jwt = false

[functions.bridge-session-refresh]
verify_jwt = false

[functions.bridge-heartbeat]
verify_jwt = false

[functions.bridge-pairing-approve]
verify_jwt = false

[functions.bridge-pairing-revoke]
verify_jwt = false

[functions.bridge-group-send]
verify_jwt = false

[functions.bridge-group-poll]
verify_jwt = false

[functions.bridge-dm-send]
verify_jwt = false

[functions.bridge-dm-poll]
verify_jwt = false

[functions.bridge-user-search]
verify_jwt = false

[functions.bridge-user-profile]
verify_jwt = false

[functions.bridge-update-check]
verify_jwt = false

[functions.link-preview]
verify_jwt = false

# Shadow Pin video validates user JWTs itself so the same endpoint can serve
# Bunny upload session creation, processing sync, and external-video imports.
[functions.shadow-pin-video]
verify_jwt = false

# send-push authenticates either the signed-in user JWT or an internal
# service-role dispatch from bridge functions. Disabling gateway JWT
# verification lets the function enforce that mixed contract itself.
[functions.send-push]
verify_jwt = false

# Account deletion validates the caller's Supabase user token in code, then
# uses the service role to remove owned storage objects before deleting auth.
[functions.delete-account]
verify_jwt = false

[functions.art-board-import-image]
enabled = true
verify_jwt = true
import_map = "./functions/art-board-import-image/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/art-board-import-image/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/art-board-import-image/*.html" ]

[functions.shadow-pin-import-image]
enabled = true
verify_jwt = true
import_map = "./functions/shadow-pin-import-image/deno.json"
entrypoint = "./functions/shadow-pin-import-image/index.ts"
