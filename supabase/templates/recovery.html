<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset your Shado password</title>
  </head>
  <body style="margin:0;background:#050607;color:#f5ebd0;font-family:Inter,Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#050607;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;border:1px solid rgba(215,170,70,0.28);border-radius:18px;background:#101214;box-shadow:0 18px 48px rgba(0,0,0,0.38);overflow:hidden;">
            <tr>
              <td style="padding:30px 28px 12px;text-align:center;">
                <div style="font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:#d7aa46;">Shado</div>
                <h1 style="margin:14px 0 0;font-size:26px;line-height:1.2;color:#fff6d8;">Reset your password</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:12px 28px 8px;text-align:center;color:#d8cdaa;font-size:15px;line-height:1.7;">
                Use this secure link to choose a new password for your Shado account.
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:22px 28px 28px;">
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;border:1px solid rgba(255,223,135,0.72);border-radius:10px;background:#d7aa46;color:#16110a;text-decoration:none;font-weight:700;padding:13px 22px;">Reset Password</a>
              </td>
            </tr>
            <tr>
              <td style="padding:0 28px 30px;text-align:center;color:#9b927f;font-size:12px;line-height:1.6;">
                If you did not request a password reset, you can ignore this email.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
