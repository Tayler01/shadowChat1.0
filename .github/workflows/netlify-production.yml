name: Netlify Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: netlify-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      NETLIFY_CLI_VERSION: 26.0.0
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_APP_BUILD_ID: ${{ github.sha }}
      VITE_APP_COMMIT_SHA: ${{ github.sha }}
      VITE_APP_DEPLOY_CONTEXT: production
      APP_RELEASE_BEFORE_SHA: ${{ github.event.before }}
      APP_RELEASE_HEAD_SHA: ${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify deploy secrets
        run: |
          test -n "$NETLIFY_AUTH_TOKEN" || { echo "NETLIFY_AUTH_TOKEN is not configured."; exit 1; }
          test -n "$NETLIFY_SITE_ID" || { echo "NETLIFY_SITE_ID is not configured."; exit 1; }
          test -n "$SUPABASE_URL" || { echo "SUPABASE_URL is not configured."; exit 1; }
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || { echo "SUPABASE_SERVICE_ROLE_KEY is not configured."; exit 1; }

      - name: Write app build metadata
        run: |
          cat > .env.production.local <<EOF
          VITE_APP_BUILD_ID=${VITE_APP_BUILD_ID}
          VITE_APP_COMMIT_SHA=${VITE_APP_COMMIT_SHA}
          VITE_APP_DEPLOY_CONTEXT=${VITE_APP_DEPLOY_CONTEXT}
          EOF

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Build with Netlify environment
        run: npx --yes netlify@$NETLIFY_CLI_VERSION build

      - name: Verify app build metadata
        run: node scripts/verify-app-build-metadata.mjs

      - name: Deploy to Netlify production
        run: |
          npx --yes netlify@$NETLIFY_CLI_VERSION deploy \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --site "$NETLIFY_SITE_ID" \
            --prod \
            --dir=dist \
            --functions=.netlify/functions \
            --skip-functions-cache \
            --message "GitHub Actions production deploy ${{ github.sha }}" \
            --json > netlify-production.json

      - name: Publish in-app release
        run: node scripts/publish-app-release.mjs --netlify-json netlify-production.json
